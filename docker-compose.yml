version: "3.8"
services:
  web:
    build: .
    command: gunicorn -w 4 -b 0.0.0.0:8000 wsgi:app
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
  redis:
    image: redis:7
    ports:
      - "6379:6379"

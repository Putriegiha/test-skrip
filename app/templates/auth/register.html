<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Register</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <h1>Register</h1>
    {% with messages = get_flashed_messages() %} {% if messages %}
    <ul>
      {% for m in messages %}
      <li>{{ m }}</li>
      {% endfor %}
    </ul>
    {% endif %} {% endwith %}
    <form method="post">
      {{ form.csrf_token }}
      <label>Username: {{ form.username(size=32) }}</label><br />
      <label>Email: {{ form.email(size=32) }}</label><br />
      <label>Password: {{ form.password() }}</label><br />
      {{ form.submit() }}
    </form>
    <p>Sudah punya akun? <a href="{{ url_for('auth.login') }}">Login</a></p>
  </body>
</html>
